<!DOCTYPE html>
<html lang="en">
<head>

<meta name="robots" content="index,follow">

<script type="application/ld+json">
{

  "about": {
    "@type": "Person",
    "name": "Dom Shaw",
    "jobTitle": "Music Producer, Recording Engineer, Mixing Engineer, Songwriter",
    "memberOf": {
      "@type": "MusicGroup",
      "name": "Waterlog"
    }
  }
}
</script>
<style>
@font-face {
  font-family: 'Press Start 2P';
  src: url('assets/fonts/PressStart2P-Regular.ttf') format('truetype');
  font-weight: 400;
  font-style: normal;
  font-display: swap;
}

.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}

:root {
  --ink: #1c1c1c;
  --shadow: #194242;
  --border: #333;
  --panel-border: #8c3b2a;
  --panel-deep: #5d2418;
  --silver-1: #f3f4f7;
  --silver-2: #d9dde4;
  --silver-3: #b7bcc5;
  --bubble-bg: rgba(255, 250, 229, 0.94);
  --bubble-shadow: #3f1b13;
  --accent: #ffe8a6;
  --accent-2: #f0b43c;
  --beam-duration: 680ms;
  --tornado-reveal-duration: 980ms;
  --wizard-cast-flash-duration: 750ms;
  --image-aspect-ratio: 4 / 3;
  --mobile-image-aspect-ratio: 1 / 1;
  --mobile-stage-height: clamp(430px, 74svh, 760px);
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: 'Press Start 2P', cursive;
}

body {
  background-image: url("assets/images/home3.png");
  background-size: cover;
  background-position: top center;
  background-repeat: no-repeat;
  min-height: 100vh;
  color: #083c3c;
}

.wrapper {
  max-width: 980px;
  margin: 28px auto;
  padding: 10px;
}

.panel {
  backdrop-filter: blur(2px);
  background: rgba(255,255,255,0.16);
  border: 3px solid var(--panel-border);
  padding: 14px;
  box-shadow: 4px 4px var(--shadow);
}

.panel-top {
  display: flex;
  justify-content: flex-start;
  margin-bottom: 12px;
}

.home-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  min-height: 34px;
  padding: 7px 10px;
  color: #414854;
  text-decoration: none;
  font-size: 7px;
  line-height: 1;
  border: 2px solid var(--border);
  background: linear-gradient(180deg, var(--silver-1) 0%, var(--silver-2) 45%, var(--silver-3) 100%);
  box-shadow: inset 0 2px rgba(255,255,255,0.55), inset 0 -2px rgba(0,0,0,0.12), 2px 2px var(--bubble-shadow);
  letter-spacing: 0.4px;
}

.home-btn:hover {
  transform: translateY(-1px);
}

.home-btn:active {
  transform: translateY(1px);
  box-shadow: inset 0 2px rgba(255,255,255,0.45), inset 0 -2px rgba(0,0,0,0.16), 1px 1px var(--bubble-shadow);
}

.home-btn-icon {
  width: 12px;
  height: 12px;
  flex: 0 0 auto;
  position: relative;
}

.home-btn-icon::before,
.home-btn-icon::after {
  content: '';
  position: absolute;
  background: #414854;
}

.home-btn-icon::before {
  left: 0;
  top: 4px;
  width: 7px;
  height: 4px;
  clip-path: polygon(100% 0, 0 50%, 100% 100%);
}

.home-btn-icon::after {
  left: 5px;
  top: 4px;
  width: 7px;
  height: 4px;
}

.story-board {
  position: relative;
  width: min(100%, 900px);
  min-height: 72vh;
  margin: 0 auto;
  padding: 12px;
  border: 3px solid var(--panel-deep);
  background: linear-gradient(180deg, rgba(67, 34, 24, 0.18) 0%, rgba(255,255,255,0.16) 100%);
  box-shadow: inset 0 0 0 3px rgba(255, 241, 188, 0.12), 4px 4px #3f1b13;
  cursor: pointer;
  touch-action: manipulation;
}

.story-stack {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.story-stage {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
  gap: 14px;
  align-items: start;
  opacity: 0;
  transform: translateY(-10px);
  transition: opacity 180ms ease, transform 180ms ease;
}

.story-stage.visible {
  opacity: 1;
  transform: translateY(0);
}

.story-stage.active .speech-bubble {
  box-shadow: inset 0 3px rgba(255,255,255,0.55), inset 0 -4px rgba(0,0,0,0.14), 3px 3px #000, 0 0 0 3px rgba(255, 232, 166, 0.18);
}

.story-stage.active.mobile-image-beat .image-box {
  box-shadow: inset 0 3px rgba(255,255,255,0.4), inset 0 -4px rgba(0,0,0,0.14), 3px 3px #000, 0 0 0 3px rgba(255, 232, 166, 0.18);
}

.story-stage .wizard-wrap {
  opacity: 0;
  visibility: hidden;
}

.story-stage.active .wizard-wrap {
  opacity: 1;
  visibility: visible;
}

.wizard-wrap.is-gone {
  opacity: 0 !important;
  visibility: hidden !important;
}

.dialogue-side {
  display: grid;
  grid-template-columns: 54px minmax(0, 1fr);
  gap: 10px;
  align-items: end;
}

.wizard-wrap {
  position: relative;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  min-height: 154px;
  padding-bottom: 6px;
  overflow: visible;
}

.wizard-sprite {
  width: 44px;
  image-rendering: pixelated;
  object-fit: contain;
  filter: drop-shadow(2px 2px 0 rgba(0, 0, 0, 0.5));
}

.beam-spell {
  position: absolute;
  left: 50%;
  bottom: 2px;
  width: 68px;
  height: 68px;
  background-image: url("assets/images/beam-spell.png");
  background-repeat: no-repeat;
  background-size: 408px 68px;
  image-rendering: pixelated;
  pointer-events: none;
  opacity: 0;
  transform: translateX(-50%);
  transform-origin: center bottom;
  filter: drop-shadow(0 0 6px rgba(214, 255, 143, 0.55));
  z-index: 2;
}

.wizard-wrap.beaming-out .beam-spell,
.wizard-wrap.beaming-in .beam-spell {
  opacity: 1;
}

.wizard-wrap.beaming-out .beam-spell {
  animation: beamFrames var(--beam-duration) steps(6, end) 1 reverse forwards;
}

.wizard-wrap.beaming-in .beam-spell {
  animation: beamFrames var(--beam-duration) steps(6, end) 1 forwards;
}

.wizard-wrap.beaming-out .wizard-sprite {
  animation: wizardFadeOut var(--beam-duration) linear forwards;
}

.wizard-wrap.beaming-in .wizard-sprite {
  animation: wizardFadeIn var(--beam-duration) linear forwards;
}

.wizard-wrap.casting .wizard-sprite {
  animation: wizardCastFlash var(--wizard-cast-flash-duration) ease-out 1;
}

.tornado-spell {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 64px;
  height: 64px;
  background-image: url("assets/images/tornado-spell.png");
  background-repeat: no-repeat;
  background-size: 256px 64px;
  image-rendering: pixelated;
  pointer-events: none;
  transform: translate(-50%, -50%) scale(var(--tornado-start-scale, 0.45));
  transform-origin: center center;
  opacity: 1;
  z-index: 2;
}

.image-reveal.spell-revealing .tornado-spell {
  animation:
    tornadoFrames 220ms steps(4, end) infinite,
    tornadoGrow var(--tornado-reveal-duration) linear forwards;
}

.image-reveal.spell-revealing .reveal-image,
.image-reveal.spell-revealing .fallback-art {
  animation: imageUnderSpell var(--tornado-reveal-duration) ease-out forwards;
}

.speech-bubble,
.image-box {
  position: relative;
  border: 3px solid var(--border);
  box-shadow: inset 0 -3px rgba(0,0,0,0.18), 3px 3px #000;
}

.speech-bubble::before,
.image-box::before {
  content: '';
  position: absolute;
  top: -6px;
  left: 12px;
  right: 12px;
  height: 6px;
  background: #999;
  border: 2px solid var(--border);
  border-bottom: none;
}

.speech-bubble {
  min-height: 154px;
  padding: 14px 14px 12px;
  background: linear-gradient(180deg, rgba(255,255,255,0.98) 0%, var(--bubble-bg) 100%);
}

.speech-bubble::after {
  content: '';
  position: absolute;
  left: -16px;
  top: var(--bubble-tail-top, 50%);
  transform: translateY(-50%);
  width: 16px;
  height: 18px;
  background: var(--bubble-bg);
  border-left: 3px solid var(--border);
  border-bottom: 3px solid var(--border);
  clip-path: polygon(100% 0, 100% 100%, 0 100%);
}

.speech-inner {
  position: relative;
  display: flex;
  flex-direction: column;
  min-height: 100%;
  gap: 10px;
}


.speaker-tag {
  align-self: flex-start;
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 6px 2px;
  margin-bottom: 4px;
  border: 1px solid rgba(55, 87, 145, 0.4);
  background: rgba(121, 162, 232, 0.12);
  box-shadow: none;
  font-size: 7.75px;
  line-height: 1.3;
  letter-spacing: 0.25px;
  color: #4d6291;
  text-shadow: none;
  opacity: 0.92;
}


.speech-text {
  font-size: 10px;
  line-height: 1.85;
  color: #2a2317;
  white-space: pre-wrap;
}

.speech-emphasis {
  color: #008d8d;
  text-shadow: 1px 1px rgba(0, 0, 0, 0.9);
  font-size: 120%;
  padding: 0 1px;
}

.speech-meta {
  margin-top: auto;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  font-size: 7px;
  color: #5f4b2a;
}

.speech-counter {
  opacity: 0.88;
}

.prompt {
  position: relative;
  min-width: 96px;
  text-align: right;
  color: #8c3b2a;
}

.prompt.ready::after {
  content: '▼';
  display: inline-block;
  margin-left: 8px;
  animation: blink 0.7s step-start infinite;
}

.image-box {
  width: 100%;
  aspect-ratio: var(--image-aspect-ratio);
  padding: 8px;
  overflow: hidden;
  align-self: start;
  background: linear-gradient(180deg, rgba(255,255,255,0.26) 0%, rgba(255,255,255,0.1) 100%);
}

.image-box.idle::after {
  content: 'IMAGE SLOT';
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 18px;
  text-align: center;
  font-size: 7px;
  line-height: 1.8;
  color: rgba(255, 244, 204, 0.76);
  text-shadow: 1px 1px rgba(0,0,0,0.5);
  pointer-events: none;
}

.image-reveal {
  position: relative;
  display: none;
  width: 100%;
  height: 100%;
  overflow: hidden;
  border: 2px solid rgba(255,255,255,0.2);
  background: #1c1f2b;
}

.image-box.revealed::after {
  display: none;
}

.image-box.revealed .image-reveal {
  display: block;
  animation: imagePop 180ms steps(4, end) both;
}

.image-box.revealed .image-reveal::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    linear-gradient(180deg, rgba(255,248,208,0.7) 0%, rgba(255,248,208,0) 100%),
    repeating-linear-gradient(0deg, rgba(255,255,255,0.18) 0 4px, transparent 4px 8px);
  mix-blend-mode: screen;
  pointer-events: none;
  animation: pixelFlash 220ms steps(3, end) forwards;
}

.reveal-image,
.fallback-art {
  width: 100%;
  height: 100%;
  object-fit: cover;
  image-rendering: pixelated;
}

.fallback-art {
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 16px;
  font-size: 8px;
  line-height: 1.8;
  color: #fff7d6;
  background:
    linear-gradient(180deg, rgba(240,180,60,0.45) 0%, rgba(58,134,255,0.32) 100%),
    repeating-linear-gradient(45deg, rgba(255,255,255,0.12) 0 10px, rgba(0,0,0,0.08) 10px 20px);
}

.loading-card,
.error-card,
.end-card {
  border: 3px solid var(--border);
  padding: 16px;
  font-size: 9px;
  line-height: 1.9;
  color: #fff7d6;
  background: rgba(0,0,0,0.35);
  box-shadow: inset 0 -3px rgba(0,0,0,0.16), 3px 3px #000;
}

.error-card {
  background: rgba(140,59,42,0.45);
}

.end-card {
  margin-top: 14px;
  color: #4b2c0b;
  background: rgba(255, 244, 204, 0.88);
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}

@keyframes imagePop {
  0% {
    opacity: 0;
    transform: translateY(4px);
    filter: brightness(1.5);
  }
  100% {
    opacity: 1;
    transform: translateY(0);
    filter: brightness(1);
  }
}

@keyframes pixelFlash {
  0% { opacity: 0.9; }
  100% { opacity: 0; }
}

@keyframes beamFrames {
  from { background-position: 0 0; }
  to { background-position: -192px 0; }
}

@keyframes tornadoFrames {
  from { background-position: 0 0; }
  to { background-position: -256px 0; }
}

@keyframes tornadoGrow {
  0% {
    transform: translate(-50%, -50%) scale(var(--tornado-start-scale, 0.45));
    opacity: 1;
  }
  100% {
    transform: translate(-50%, -50%) scale(var(--tornado-end-scale, 3.2));
    opacity: 0;
  }
}

@keyframes imageUnderSpell {
  0% { opacity: 0; }
  72% { opacity: 0; }
  88% { opacity: 0.42; }
  100% { opacity: 1; }
}

@keyframes wizardFadeOut {
  0% { opacity: 1; }
  35% { opacity: 0; }
  100% { opacity: 0; }
}

@keyframes wizardFadeIn {
  0% { opacity: 0; }
  55% { opacity: 0; }
  100% { opacity: 1; }
}


@keyframes wizardCastFlash {
  0% {
    filter: drop-shadow(2px 2px 0 rgba(0, 0, 0, 0.5));
    transform: scale(1);
  }
  10% {
    filter: drop-shadow(2px 2px 0 rgba(0, 0, 0, 0.5));
    transform: scale(1);
  }
  22% {
    filter: brightness(0) saturate(0) invert(1) drop-shadow(0 0 8px rgba(255, 255, 255, 0.9));
    transform: scale(1.04);
  }
  76% {
    filter: brightness(0) saturate(0) invert(1) drop-shadow(0 0 10px rgba(255, 255, 255, 0.98));
    transform: scale(1.06);
  }
  100% {
    filter: drop-shadow(2px 2px 0 rgba(0, 0, 0, 0.5));
    transform: scale(1);
  }
}

@keyframes wizardPop {
  0% {
    opacity: 0;
    transform: translateY(6px);
  }
  100% {
    opacity: 1;
    transform: translateY(0);
  }
}

@media (max-width: 860px) {
  .wrapper {
    max-width: 760px;
    margin: 18px auto;
    padding: 8px;
  }

  .story-board {
    min-height: auto;
    padding: 10px;
  }

  .story-stage {
    grid-template-columns: 1fr;
    gap: 8px;
  }

  .dialogue-side {
    grid-template-columns: 44px minmax(0, 1fr);
    gap: 8px;
  }

  .wizard-wrap,
  .speech-bubble {
    min-height: 132px;
  }

  .wizard-sprite {
    width: 34px;
  }

  .speech-bubble {
    padding: 12px 12px 10px;
  }

  .speech-bubble::after {
    left: -12px;
    top: 50%;
    transform: translateY(-50%);
    width: 12px;
    height: 16px;
  }

  .image-box {
    width: calc(100% - 52px);
    max-width: calc(100% - 52px);
    margin-left: 52px;
  }
}

@media (max-width: 768px) {
  body {
    background-position: center top;
  }

  .wrapper {
    margin: 0;
    max-width: 100%;
    padding: 6px;
  }

  .panel {
    padding: 10px;
  }

  .panel-top {
    margin-bottom: 10px;
  }

  .home-btn {
    min-height: 30px;
    padding: 6px 8px;
    font-size: 6px;
    gap: 4px;
  }

  .story-board {
    padding: 8px;
    min-height: var(--mobile-stage-height);
  }

  .story-stack {
    gap: 0;
    min-height: calc(var(--mobile-stage-height) - 16px);
  }

  .story-stage {
    display: none;
    min-height: calc(var(--mobile-stage-height) - 16px);
    grid-template-columns: 34px minmax(0, 1fr);
    gap: 8px;
    align-items: start;
    align-content: start;
  }

  .story-stage.active {
    display: grid;
  }

  .dialogue-side {
    display: contents;
  }

  .wizard-wrap {
    grid-column: 1;
    min-height: 0;
    align-items: flex-start;
    justify-content: center;
    padding-top: 28px;
    padding-bottom: 0;
  }

  .wizard-sprite {
    width: 28px;
  }

  .beam-spell {
    bottom: 2px;
    width: 68px;
    height: 68px;
    background-size: 408px 68px;
  }

  .speech-bubble,
  .image-box {
    grid-column: 2;
    width: 100%;
    max-width: 100%;
  }

  .speech-bubble {
    min-height: 176px;
    padding: 14px 13px 12px;
  }

  .speech-bubble::after {
    left: -10px;
    top: 24px;
    transform: none;
    width: 10px;
    height: 12px;
    border-left-width: 2px;
    border-bottom-width: 2px;
  }

  .speech-text {
    font-size: 12px;
    line-height: 1.9;
  }

  .speaker-tag {
    gap: 3px;
    padding: 3px 6px 3px;
    margin-bottom: 6px;
    font-size: 6px;
    letter-spacing: 0.18px;
  }

  .speech-meta,
  .image-box.idle::after,
  .fallback-art,
  .loading-card,
  .error-card,
  .end-card {
    font-size: 6px;
  }

  .speech-meta {
    gap: 8px;
    align-items: flex-end;
  }

  .prompt {
    min-width: 82px;
  }

  .image-box {
    display: none;
    aspect-ratio: var(--mobile-image-aspect-ratio);
    margin: 0;
    padding: 8px 8px 14px;
    align-self: start;
  }

  .story-stage.mobile-image-beat {
    grid-template-columns: 34px minmax(0, 1fr);
    gap: 8px;
    align-items: start;
    align-content: start;
  }

  .story-stage.mobile-image-beat .wizard-wrap {
    display: flex;
    grid-column: 1;
    grid-row: 1;
  }

  .story-stage.mobile-image-beat .speech-bubble {
    display: block;
    grid-column: 2;
    grid-row: 1;
  }

  .story-stage.mobile-image-beat .image-box {
    display: block;
    grid-column: 2;
    grid-row: 2;
    width: 100%;
    max-width: 100%;
    margin-top: 8px;
  }

  .end-card {
    min-height: auto;
    width: fit-content;
    max-width: min(100%, 480px);
    margin: 18px auto 0;
    padding: 16px 18px;
    font-size: 10px;
    line-height: 1.5;
    display: block;
    text-align: center;
  }
}
</style>

<body>
  <section class="sr-only" aria-label="Credits page description">
  <h1>About - Dom Shaw</h1>
  <p>A page about Dom Shaw - Music Producer, Engineer, Musician & Songwriter</p>
</section>
  <div class="wrapper">
    <div class="panel">
      <div class="panel-top">
        <a class="home-btn" href="index.html" aria-label="Back to home page">
          <span class="home-btn-icon" aria-hidden="true"></span>
          <span>HOME</span>
        </a>
      </div>

      <main class="story-board" id="storyBoard" aria-live="polite">
        <div class="story-stack" id="storyStack">
          <div class="loading-card">LOADING THE WIZARD...</div>
        </div>
      </main>
    </div>
  </div>

<script>
const DATA_PATH = 'assets/data/about-dialogue.json';
const WIZARD_PATH = 'assets/images/wizard.png';

const storyBoard = document.getElementById('storyBoard');
const storyStack = document.getElementById('storyStack');
const mobileLayoutQuery = window.matchMedia('(max-width: 768px)');

const state = {
  speeches: [],
  currentSpeechIndex: 0,
  currentParagraphIndex: 0,
  isTyping: false,
  typingFrame: null,
  typedText: '',
  rows: [],
  isReady: false,
  hasEnded: false,
  isTransitioning: false
};

function syncSpeechBubbleTail(row) {
  if (!row || !row.speechBubble || !row.wizardSprite) return;

  if (isMobileLayout()) {
    row.speechBubble.style.removeProperty('--bubble-tail-top');
    return;
  }

  const bubbleRect = row.speechBubble.getBoundingClientRect();
  const spriteRect = row.wizardSprite.getBoundingClientRect();
  const rawTop = spriteRect.top - bubbleRect.top;
  const minTop = 16;
  const maxTop = Math.max(minTop, bubbleRect.height - 24);
  const clampedTop = Math.min(Math.max(rawTop, minTop), maxTop);

  row.speechBubble.style.setProperty('--bubble-tail-top', `${clampedTop}px`);
}

function syncRowHeight(row) {
  if (!row || !row.imageBox) return;
  requestAnimationFrame(() => {
    row.imageBox.style.height = '';
    row.imageBox.style.minHeight = '';
    syncSpeechBubbleTail(row);
  });
}

function createStage(speech, speechIndex) {
  const stage = document.createElement('section');
  stage.className = 'story-stage';
  stage.dataset.speechIndex = String(speechIndex);

  stage.innerHTML = `
    <div class="dialogue-side">
      <div class="wizard-wrap">
        <div class="beam-spell" aria-hidden="true"></div>
        <img class="wizard-sprite" src="${WIZARD_PATH}" alt="Wizard sprite" loading="lazy">
      </div>
      <div class="speech-bubble">
        <div class="speech-inner">
          <div class="speaker-tag" aria-label="Speaker name">THE WIZARD OF ABOUTNESS</div>
          <div class="speech-text"></div>
          <div class="speech-meta">
            <div class="speech-counter">SPEECH ${speechIndex + 1} / ${state.speeches.length}</div>
            <div class="prompt"></div>
          </div>
        </div>
      </div>
    </div>
    <aside class="image-box idle" aria-label="Reserved image reveal area">
      <div class="image-reveal"></div>
    </aside>
  `;

  storyStack.appendChild(stage);
  requestAnimationFrame(() => {
    stage.classList.add('visible');
    syncRowHeight(refs);
  });

  const refs = {
    stage,
    text: stage.querySelector('.speech-text'),
    prompt: stage.querySelector('.prompt'),
    imageBox: stage.querySelector('.image-box'),
    imageReveal: stage.querySelector('.image-reveal'),
    speechBubble: stage.querySelector('.speech-bubble'),
    wizardWrap: stage.querySelector('.wizard-wrap'),
    wizardSprite: stage.querySelector('.wizard-sprite'),
    speech,
    imageShown: false
  };

  const wizardSprite = refs.wizardSprite;
  wizardSprite.addEventListener('error', () => {
    wizardSprite.style.display = 'none';
    syncRowHeight(refs);
  }, { once: true });

  wizardSprite.addEventListener('load', () => {
    syncRowHeight(refs);
  }, { once: true });

  state.rows[speechIndex] = refs;
  syncRowHeight(refs);
  return refs;
}

function setPrompt(row, text, ready) {
  row.prompt.textContent = text;
  row.prompt.classList.toggle('ready', Boolean(ready));
}

function setActiveStage(activeIndex) {
  state.rows.forEach((row, index) => {
    if (!row) return;
    const isActive = index === activeIndex && !state.hasEnded;
    row.stage.classList.toggle('active', isActive);
    setWizardVisible(row, isActive);
  });
}

const BEAM_DURATION = 680;
const TORNADO_REVEAL_DURATION = 980;
const WIZARD_CAST_FLASH_DURATION = 750;

function wait(ms) {
  return new Promise((resolve) => setTimeout(resolve, ms));
}

function isMobileLayout() {
  return mobileLayoutQuery.matches;
}

function setWizardVisible(row, visible) {
  if (!row || !row.wizardWrap) return;
  row.wizardWrap.classList.toggle('is-gone', !visible);
}

function hideAllWizards() {
  state.rows.forEach((row) => setWizardVisible(row, false));
}

function setMobileBeatState(row, showImageBeat) {
  if (!row) return;
  row.stage.classList.toggle('mobile-image-beat', Boolean(showImageBeat) && isMobileLayout());
}

function triggerWizardCastFlash(row) {
  if (!row || !row.wizardWrap) return;
  row.wizardWrap.classList.remove('casting');
  void row.wizardWrap.offsetWidth;
  row.wizardWrap.classList.add('casting');
  window.setTimeout(() => {
    row.wizardWrap.classList.remove('casting');
  }, WIZARD_CAST_FLASH_DURATION);
}

async function playBeam(row, direction) {
  if (!row || !row.wizardWrap) return;
  const beamClass = direction === 'out' ? 'beaming-out' : 'beaming-in';
  row.wizardWrap.classList.remove('beaming-out', 'beaming-in');
  void row.wizardWrap.offsetWidth;
  row.wizardWrap.classList.add(beamClass);
  await wait(BEAM_DURATION);
  row.wizardWrap.classList.remove(beamClass);
}

function getTornadoEndScale(row) {
  const widthScale = row.imageBox.clientWidth / 64;
  const heightScale = row.imageBox.clientHeight / 64;
  return Math.max(widthScale, heightScale, 2.4).toFixed(2);
}

function createFallbackArt(row) {
  const fallback = document.createElement('div');
  fallback.className = 'fallback-art';
  fallback.textContent = `PLACEHOLDER IMAGE\n${row.speech.imageLabel || 'UPDATE THIS SLOT'}`;
  return fallback;
}

function loadRevealContent(row) {
  return new Promise((resolve) => {
    const image = new Image();
    image.className = 'reveal-image';
    image.alt = row.speech.imageAlt || 'About page image';

    let resolved = false;
    const finish = (node) => {
      if (resolved) return;
      resolved = true;
      resolve(node);
    };

    image.addEventListener('load', () => finish(image), { once: true });
    image.addEventListener('error', () => finish(createFallbackArt(row)), { once: true });

    image.src = row.speech.image || '';

    if (image.complete) {
      if (image.naturalWidth > 0) {
        finish(image);
      } else if (!image.src) {
        finish(createFallbackArt(row));
      }
    }
  });
}

async function runTornadoReveal(row, contentNode) {
  const tornadoSpell = document.createElement('div');
  tornadoSpell.className = 'tornado-spell';
  triggerWizardCastFlash(row);
  row.imageReveal.innerHTML = '';
  row.imageReveal.style.setProperty('--tornado-start-scale', '0.45');
  row.imageReveal.style.setProperty('--tornado-end-scale', getTornadoEndScale(row));
  row.imageReveal.appendChild(contentNode);
  row.imageReveal.appendChild(tornadoSpell);
  row.imageReveal.classList.add('spell-revealing');
  syncRowHeight(row);
  await wait(TORNADO_REVEAL_DURATION);
  row.imageReveal.classList.remove('spell-revealing');
  tornadoSpell.remove();
  syncRowHeight(row);
}

async function transitionToSpeech(nextIndex) {
  const currentRow = state.rows[state.currentSpeechIndex];
  if (!state.rows[nextIndex]) {
    createStage(state.speeches[nextIndex], nextIndex);
  }
  const nextRow = state.rows[nextIndex];

  setWizardVisible(currentRow, true);
  await playBeam(currentRow, 'out');
  setWizardVisible(currentRow, false);
  setPrompt(currentRow, 'IMAGE LOCKED', false);
  setMobileBeatState(currentRow, false);

  state.currentSpeechIndex = nextIndex;
  state.currentParagraphIndex = 0;
  setActiveStage(nextIndex);
  setMobileBeatState(nextRow, false);
  setWizardVisible(nextRow, true);

  await playBeam(nextRow, 'in');
  typeParagraph(nextIndex, 0);
}

function getParagraphSource(paragraph) {
  if (typeof paragraph === 'string') return paragraph;
  if (paragraph && typeof paragraph.text === 'string') return paragraph.text;
  return '';
}

function parseParagraphMarkup(paragraph) {
  const source = getParagraphSource(paragraph);
  const segments = [];
  const emphasisPattern = /\*\*(.+?)\*\*/g;
  let lastIndex = 0;
  let match;

  while ((match = emphasisPattern.exec(source)) !== null) {
    if (match.index > lastIndex) {
      segments.push({ text: source.slice(lastIndex, match.index), emphasis: false });
    }
    segments.push({ text: match[1], emphasis: true });
    lastIndex = emphasisPattern.lastIndex;
  }

  if (lastIndex < source.length) {
    segments.push({ text: source.slice(lastIndex), emphasis: false });
  }

  if (!segments.length) {
    segments.push({ text: source, emphasis: false });
  }

  return {
    raw: source,
    plainText: segments.map((segment) => segment.text).join(''),
    segments
  };
}

function normalizeSpeech(speech) {
  const paragraphs = Array.isArray(speech?.paragraphs) ? speech.paragraphs.map(parseParagraphMarkup) : [];
  return {
    ...speech,
    paragraphs
  };
}

function renderParagraph(container, paragraph, visibleCharacters = paragraph.plainText.length) {
  container.innerHTML = '';
  let remaining = visibleCharacters;

  paragraph.segments.forEach((segment) => {
    if (remaining <= 0 || !segment.text) return;

    const piece = segment.text.slice(0, remaining);
    remaining -= piece.length;

    if (!piece) return;

    if (segment.emphasis) {
      const emphasisNode = document.createElement('span');
      emphasisNode.className = 'speech-emphasis';
      emphasisNode.textContent = piece;
      container.appendChild(emphasisNode);
      return;
    }

    container.appendChild(document.createTextNode(piece));
  });
}

function finishTyping() {
  if (!state.isTyping) return;
  const row = state.rows[state.currentSpeechIndex];
  const paragraph = row.speech.paragraphs[state.currentParagraphIndex] || parseParagraphMarkup('');
  if (state.typingFrame) {
    clearTimeout(state.typingFrame);
    state.typingFrame = null;
  }
  state.typedText = paragraph.plainText;
  renderParagraph(row.text, paragraph);
  state.isTyping = false;
  syncRowHeight(row);
  setPrompt(row, 'CLICK TO CONTINUE', true);
}

function stepType(row, paragraph, position) {
  renderParagraph(row.text, paragraph, position);
  syncRowHeight(row);

  if (position >= paragraph.plainText.length) {
    state.isTyping = false;
    state.typingFrame = null;
    state.typedText = paragraph.plainText;
    setPrompt(row, 'CLICK TO CONTINUE', true);
    return;
  }

  const char = paragraph.plainText[position - 1] || '';
  let delay = 44;
  if (char === ' ' || char === '\n') delay = 0;
  if (char === '.') delay = 300;
  else if (/[!?]/.test(char)) delay = 150;
  else if (char === ',') delay = 110;
  else if (/[-:;]/.test(char)) delay = 80;

  state.typingFrame = setTimeout(() => stepType(row, paragraph, position + 1), delay);
}

function typeParagraph(speechIndex, paragraphIndex) {
  const row = state.rows[speechIndex];
  const paragraph = row.speech.paragraphs[paragraphIndex] || parseParagraphMarkup('');
  setActiveStage(speechIndex);
  setMobileBeatState(row, false);
  row.text.textContent = '';
  setPrompt(row, 'TYPING...', false);
  state.isTyping = true;
  state.typedText = '';
  if (state.typingFrame) clearTimeout(state.typingFrame);
  syncRowHeight(row);
  stepType(row, paragraph, 1);
}

async function revealImage(row) {
  row.imageShown = true;
  row.imageBox.classList.remove('idle');
  row.imageBox.classList.add('revealed');
  setPrompt(row, 'CASTING...', false);

  if (isMobileLayout()) {
    setMobileBeatState(row, true);
  }

  const contentNode = await loadRevealContent(row);
  await runTornadoReveal(row, contentNode);

  syncRowHeight(row);
  setPrompt(row, state.currentSpeechIndex < state.speeches.length - 1 ? 'CLICK TO CONTINUE' : 'CLICK TO FINISH', true);
}

function addEndCard() {
  hideAllWizards();

  if (isMobileLayout()) {
    const activeRow = state.rows[state.currentSpeechIndex];
    if (activeRow) {
      activeRow.stage.classList.remove('active', 'mobile-image-beat');
    }
  }

  const endCard = document.createElement('div');
  endCard.className = 'end-card';
  endCard.textContent = 'THE WIZARD HAS SAID ALL HE CAME TO SAY.';
  storyStack.appendChild(endCard);
}

async function advanceDialogue() {
  if (!state.isReady || state.hasEnded || state.isTransitioning) return;
  if (state.isTyping) {
    finishTyping();
    return;
  }

  const row = state.rows[state.currentSpeechIndex];
  const speech = row.speech;

  if (state.currentParagraphIndex < speech.paragraphs.length - 1) {
    state.currentParagraphIndex += 1;
    typeParagraph(state.currentSpeechIndex, state.currentParagraphIndex);
    return;
  }

  if (!row.imageShown) {
    state.isTransitioning = true;
    try {
      await revealImage(row);
    } finally {
      state.isTransitioning = false;
    }
    return;
  }

  if (state.currentSpeechIndex < state.speeches.length - 1) {
    state.isTransitioning = true;
    try {
      await transitionToSpeech(state.currentSpeechIndex + 1);
    } finally {
      state.isTransitioning = false;
    }
    return;
  }

  state.hasEnded = true;
  setPrompt(row, 'THE END', false);
  addEndCard();
}

async function loadStory() {
  try {
    const response = await fetch(DATA_PATH);
    if (!response.ok) throw new Error(`HTTP ${response.status}`);

    const payload = await response.json();
    state.speeches = Array.isArray(payload.speeches) ? payload.speeches.map(normalizeSpeech) : [];
    storyStack.innerHTML = '';

    if (!state.speeches.length) {
      storyStack.innerHTML = '<div class="error-card">NO WIZARD SPEECHES WERE FOUND.</div>';
      return;
    }

    state.isReady = true;
    createStage(state.speeches[0], 0);
    typeParagraph(0, 0);
  } catch (error) {
    console.error('Failed to load about dialogue:', error);
    storyStack.innerHTML = '<div class="error-card">FAILED TO LOAD THE WIZARD SCRIPT.</div>';
  }
}

storyBoard.addEventListener('click', (event) => {
  if (event.target.closest('.home-btn')) return;
  advanceDialogue();
});

window.addEventListener('keydown', (event) => {
  if (event.key === 'Enter' || event.key === ' ') {
    event.preventDefault();
    advanceDialogue();
  }
});

window.addEventListener('resize', () => {
  state.rows.forEach(syncRowHeight);
  state.rows.forEach((row) => {
    if (!row) return;
    setMobileBeatState(row, row.imageShown && row === state.rows[state.currentSpeechIndex] && !state.hasEnded);
  });
});

loadStory();
</script>
</body>
</html>
