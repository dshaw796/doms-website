<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Credits Catalogue</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: 'Press Start 2P', cursive;
}

body {
  background-image: url("assets/images/home3.png");
  background-size: cover;
  background-position: top center;
  background-repeat: no-repeat;
  min-height: 100vh;
  color: #083c3c;
}

.wrapper {
  max-width: 800px;
  margin: 40px auto;
  padding: 10px;
}

.panel {
  backdrop-filter: blur(2px);
  background: rgba(255,255,255,0.15);
  border: 3px solid #8c3b2a;
  padding: 20px;
  box-shadow: 4px 4px #194242;
}

.title {
  text-align: center;
  font-size: 12px;
  margin-bottom: 20px;
  color: #8c3b2a;
}

.categories {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
  margin-bottom: 20px;
}

.category-btn {
  font-size: 8px;
  padding: 8px;
  border: 2px solid #2b6f6f;
  background: #8c3b2a;
  color: #fff;
  cursor: pointer;
}

.category-btn.active {
  background: #2b6f6f;
}

.content {
  display: grid;
  grid-template-columns: 280px 1fr;
  gap: 20px;
  align-items: start;
}

.info-panel {
  backdrop-filter: blur(10px);
  background: rgba(255,255,255,0.25);
  border: 3px solid #2b6f6f;
  padding: 15px;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 220px;
}

.info-panel img {
  width: 100%;
  margin-bottom: 10px;
  border: 2px solid #333;
  image-rendering: pixelated;
}

.info-title {
  font-size: 9px;
  margin-bottom: 10px;
  text-align: center;
}

.info-type,
.info-meta {
  font-size: 7px;
  color: #8c3b2a;
  margin-bottom: 6px;
  line-height: 1.6;
}

.info-text {
  width: 100%;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
  gap: 12px;
  max-height: 70vh;
  overflow-y: auto;
  padding-right: 5px;
}

.album {
  background:#cfd8cf;
  border:3px solid #333;
  padding:6px;
  cursor:pointer;
  position:relative;
  box-shadow:inset 0 -3px #888,2px 2px #000;
  transition:transform 0.1s;
}

.album:active {
  transform:scale(0.92);
}

.album.loaded {
  animation:pulse 1.5s infinite;
}

@keyframes pulse {
  0% { box-shadow: inset 0 -3px #888,2px 2px #000,0 0 0px #a8e0a8; }
  50% { box-shadow: inset 0 -3px #888,2px 2px #000,0 0 6px #a8e0a8; }
  100% { box-shadow: inset 0 -3px #888,2px 2px #000,0 0 0px #a8e0a8; }
}

.album::before {
  content:'';
  position:absolute;
  top:-6px;
  left:10px;
  right:10px;
  height:6px;
  background:#999;
  border:2px solid #333;
  border-bottom:none;
}

.album::after {
  content:'';
  position:absolute;
  bottom:4px;
  left:50%;
  transform:translateX(-50%);
  width:60%;
  height:3px;
  background:#888;
}

.album img {
  width:100%;
  image-rendering:pixelated;
  border:2px solid #333;
}

.album p {
  font-size:6px;
  margin-top:4px;
  text-align:center;
  color:#000;
  line-height: 1.4;
}

.status {
  font-size: 8px;
  text-align: center;
  color: #8c3b2a;
  padding: 16px;
}

@media (max-width: 768px) {
  .wrapper {
    margin: 0;
    max-width: 100%;
  }

  .content {
    grid-template-columns: 1fr;
  }

  .info-panel {
    flex-direction: row;
    align-items: center;
    gap: 10px;
  }

  .info-panel img {
    width: 40%;
    margin: 0;
  }

  .info-text {
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
}
</style>
</head>
<body>
<div class="wrapper">
  <div class="panel">
    <div class="title">CREDITS DATABASE</div>

    <div class="categories">
      <button class="category-btn active" data-type="ALL">ALL</button>
      <button class="category-btn" data-type="ENGINEER">ENGINEER</button>
      <button class="category-btn" data-type="PERFORMING">PERFORMING</button>
      <button class="category-btn" data-type="MIX">MIX</button>
      <button class="category-btn" data-type="PRODUCTION">PRODUCTION</button>
      <button class="category-btn" data-type="ASST. ENG">ASST. ENG</button>
    </div>

    <div class="content">
      <div class="info-panel" id="infoPanel">
        <div class="info-title">SELECT AN ALBUM</div>
      </div>

      <div class="grid" id="grid">
        <div class="status">LOADING CREDITS...</div>
      </div>
    </div>
  </div>
</div>

<script>
let credits = [];
let currentFilter = "ALL";
let selectedCredit = null;

const grid = document.getElementById("grid");
const infoPanel = document.getElementById("infoPanel");
const buttons = document.querySelectorAll(".category-btn");
const clickSound = new Audio("assets/audio/click.mp3");
clickSound.preload = "auto";

function playClickSound() {
  clickSound.currentTime = 0;
  clickSound.play().catch(() => {});
}

function renderCredits(filter) {
  currentFilter = filter;
  grid.innerHTML = "";

  const filtered = filter === "ALL"
    ? credits
    : credits.filter(c => c.type === filter);

  if (!filtered.length) {
    grid.innerHTML = '<div class="status">NO CREDITS FOUND</div>';
    if (selectedCredit && !credits.some(c => c.name === selectedCredit.name && c.type === selectedCredit.type)) {
      selectedCredit = null;
      resetInfoPanel();
    }
    return;
  }

  filtered.forEach(credit => {
    const card = document.createElement("div");
    card.className = "album";

    if (selectedCredit && credit.name === selectedCredit.name && credit.type === selectedCredit.type) {
      card.classList.add("loaded");
    }

    card.innerHTML = `
      <img src="${credit.image}" alt="${credit.name} cover" loading="lazy">
      <p>${credit.name}</p>
    `;

    card.onclick = () => {
      selectedCredit = credit;
      document.querySelectorAll(".album").forEach(a => a.classList.remove("loaded"));
      card.classList.add("loaded");
      showInfo(credit);
      playClickSound();
    };

    grid.appendChild(card);
  });

  if (selectedCredit) {
    const selectedStillVisible = filtered.some(c => c.name === selectedCredit.name && c.type === selectedCredit.type);
    if (selectedStillVisible) {
      showInfo(selectedCredit);
    }
  }
}

function showInfo(credit) {
  infoPanel.innerHTML = `
    <img src="${credit.image}" alt="${credit.name} cover" loading="lazy">
    <div class="info-text">
      <div class="info-title">${credit.name}</div>
      <div class="info-type">${credit.role}</div>
      <div class="info-meta">ARTIST: ${credit.artist}</div>
      <div class="info-meta">YEAR: ${credit.year}</div>
      <div class="info-meta">TYPE: ${credit.type}</div>
      <div class="info-meta">LABEL: ${credit.label}</div>
      <div class="info-meta">STUDIO: ${credit.studio}</div>
      <div class="info-meta">GENRE: ${credit.genre}</div>
    </div>
  `;
}

function resetInfoPanel(message = "SELECT AN ALBUM") {
  infoPanel.innerHTML = `<div class="info-title">${message}</div>`;
}

async function loadCredits() {
  try {
    const response = await fetch("assets/data/credits.json");
    if (!response.ok) {
      throw new Error(`HTTP ${response.status}`);
    }

    credits = await response.json();
    renderCredits(currentFilter);
  } catch (error) {
    console.error("Failed to load credits:", error);
    grid.innerHTML = '<div class="status">FAILED TO LOAD CREDITS</div>';
    resetInfoPanel("DATA ERROR");
  }
}

buttons.forEach(btn => {
  btn.addEventListener("click", () => {
    buttons.forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    renderCredits(btn.dataset.type);
  });
});

loadCredits();
</script>
</body>
</html>
