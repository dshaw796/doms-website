<style>
@font-face {
  font-family: 'Press Start 2P';
  src: url('assets/fonts/PressStart2P-Regular.ttf') format('truetype');

  font-style: normal;
  font-display: swap;
}

:root {
  --production: #f0b43c;
  --performing: #c93b4d;
  --mixing: #3a86ff;
  --engineering: #4fbf74;
  --asst-eng: #9b6bdb;
  --neutral: #cfd8cf;
  --neutral-dark: #8e9890;
  --ink: #1c1c1c;
  --shadow: #194242;
  --border: #333;
  --silver-1: #f3f4f7;
  --silver-2: #d9dde4;
  --silver-3: #b7bcc5;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: 'Press Start 2P', cursive;
}

.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}

body {
  background-image: url("assets/images/home3.png");
  background-size: cover;
  background-position: top center;
  background-repeat: no-repeat;
  min-height: 100vh;
  color: #083c3c;
}

.wrapper {
  max-width: 1020px;
  margin: 36px auto;
  padding: 10px;
}

.panel {

}

.title-wrap {

}

.title {

  padding: 14px 132px;

  background: linear-gradient(180deg, #b45a3c 0%, #8c3b2a 52%, #6e2a1e 100%);
  box-shadow: inset 0 3px rgba(255,255,255,0.25), inset 0 -4px rgba(0,0,0,0.25), 0 0 0 3px rgba(255,241,188,0.15), 4px 4px #3f1b13;

}

.home-btn {

  top: 50%;

.home-btn-icon {

}


.content {

  grid-template-columns: 320px 1fr;
  gap: 20px;

}

.info-panel {

}

.card-shell {

.card-shell::before {

.nameplate,

.info-art.shiny::after,
.album-art.shiny::after {

<body>
<section class="sr-only" aria-label="Credits page description">
  <h1>Credits - Dom Shaw</h1>
  <p>Production, mixing, engineering, performing and assistant engineering credits attributed to Dom Shaw, including work connected to Waterlog.</p>
</section>
<div class="wrapper">
  <div class="panel">
    <div class="title-wrap">
      <a class="home-btn" href="index.html" aria-label="Back to home page">
        <span class="home-btn-icon" aria-hidden="true"></span>
        <span>HOME</span>
      </a>
      <div class="title">CREDITS DATABASE<span>INDEX OF CREDITS ATTRIBUTED TO DOM SHAW</span></div>
    </div>

    <div class="categories">
      <button class="category-btn active" data-type="ALL">
        <span class="label-full">ALL</span>
        <span class="label-short">ALL</span>
      </button>
      <button class="category-btn" data-type="PRODUCTION">
        <img src="assets/symbols/lightning.png" alt="" loading="lazy">
        <span class="label-full">PRODUCTION</span>
        <span class="label-short">PROD</span>
      </button>
      <button class="category-btn" data-type="MIXING">
        <img src="assets/symbols/water.png" alt="" loading="lazy">
        <span class="label-full">MIXING</span>
        <span class="label-short">MIX</span>
      </button>
      <button class="category-btn" data-type="ENGINEERING">
        <img src="assets/symbols/nature.png" alt="" loading="lazy">
        <span class="label-full">ENGINEERING</span>
        <span class="label-short">ENG</span>
      </button>
      <button class="category-btn" data-type="PERFORMING">
        <img src="assets/symbols/fire.png" alt="" loading="lazy">
        <span class="label-full">PERFORMING</span>
        <span class="label-short">PERF</span>
      </button>
      <button class="category-btn" data-type="ASST. ENG">
        <img src="assets/symbols/dragon.png" alt="" loading="lazy">
        <span class="label-full">ASST. ENG</span>
        <span class="label-short">ASST</span>
      </button>
    </div>

    <div class="content">
      <div class="info-panel" id="infoPanel"></div>
      <div class="grid" id="grid"></div>
    </div>
  </div>
</div>

<script>
const TYPE_PRIORITY = ["PRODUCTION", "MIXING", "ENGINEERING", "PERFORMING", "ASST. ENG"];
const TYPE_COLORS = {
  "PRODUCTION": "var(--production)",
  "PERFORMING": "var(--performing)",
  "MIXING": "var(--mixing)",
  "ENGINEERING": "var(--engineering)",
  "ASST. ENG": "var(--asst-eng)"
};
const TYPE_SYMBOLS = {
  "PRODUCTION": "assets/symbols/lightning.png",
  "PERFORMING": "assets/symbols/fire.png",
  "MIXING": "assets/symbols/water.png",
  "ENGINEERING": "assets/symbols/nature.png",
  "ASST. ENG": "assets/symbols/dragon.png"
};

let credits = [];
let currentFilter = "ALL";
let selectedCredit = null;
const grid = document.getElementById("grid");
const infoPanel = document.getElementById("infoPanel");
const buttons = document.querySelectorAll(".category-btn");
const homeBtn = document.querySelector(".home-btn");
const clickSound = new Audio("assets/audio/slide.mp3");
clickSound.preload = "auto";
const knockSound = new Audio("assets/audio/knock.mp3");
knockSound.preload = "auto";

function normalizeTypes(types = []) {
  return [...types].sort((a, b) => TYPE_PRIORITY.indexOf(a) - TYPE_PRIORITY.indexOf(b));
}

function getTopTypes(credit) {
  const ordered = normalizeTypes(credit.types || []);
  return ordered.slice(0, 2);
}

function getCardBackground(credit) {
  const topTypes = getTopTypes(credit);
  if (topTypes.length === 0) return "var(--neutral)";
  if (topTypes.length === 1) return TYPE_COLORS[topTypes[0]];
  return `linear-gradient(135deg, ${TYPE_COLORS[topTypes[0]]} 0%, ${TYPE_COLORS[topTypes[0]]} 49%, ${TYPE_COLORS[topTypes[1]]} 51%, ${TYPE_COLORS[topTypes[1]]} 100%)`;
}

function isSameCredit(a, b) {
  if (!a || !b) return false;
  return a.name === b.name && a.artist === b.artist && a.year === b.year;
}

function playClickSound() {
  try {
    clickSound.currentTime = 0;
    clickSound.play().catch(() => {});
  } catch (_) {}
}

function playKnockSound() {
  try {
    knockSound.currentTime = 0;
    knockSound.play().catch(() => {});
  } catch (_) {}
}

function resetInfoPanel(message = "SELECT AN ALBUM") {
  infoPanel.innerHTML = `
    <div class="card-shell">
      <div class="info-card">
        <div class="nameplate">${message}</div>
        <div class="info-meta-wrap" style="margin-top:12px;">
          <div class="info-meta">LOAD A CARTRIDGE TO VIEW CREDITS AND DATA.</div>
        </div>
      </div>
    </div>
  `;
}

function showInfo(credit) {
  const orderedTypes = normalizeTypes(credit.types || []);
  const primaryType = orderedTypes[0];
  const primaryLabelColor = primaryType ? TYPE_COLORS[primaryType] : "#4b2222";
  const artBg = getCardBackground(credit);
  const shinyClass = orderedTypes.length >= 2 ? "shiny" : "";
  const symbolMarkup = orderedTypes
    .map(type => `<img src="${TYPE_SYMBOLS[type]}" alt="${type} symbol" loading="lazy">`)
    .join("");

  infoPanel.innerHTML = `
    <div class="card-shell">
      <div class="info-card detail-layout">
        <div class="info-header">
          <div class="nameplate">${credit.name}</div>
          <div class="power-box">
            <div class="power-symbols">${symbolMarkup}</div>
            <div class="power-value">${credit.power || "88"}</div>
          </div>
        </div>
        <div class="info-art ${shinyClass}" style="background:${artBg};">
          <img src="${credit.image}" alt="${credit.name} by ${credit.artist}. Dom Shaw credit: ${credit.role}" loading="lazy">
        </div>
        <div class="info-meta-wrap" style="--meta-label-color:${primaryLabelColor};">
          <div class="info-meta"><span class="info-meta-label">ARTIST</span><span class="info-meta-value">${credit.artist}</span></div>
          <div class="info-meta"><span class="info-meta-label">YEAR</span><span class="info-meta-value">${credit.year}</span></div>
          <div class="info-meta"><span class="info-meta-label">ROLE</span><span class="info-meta-value">${credit.role}</span></div>
          <div class="info-meta"><span class="info-meta-label">TRACK</span><span class="info-meta-value">${credit.tracks}</span></div>
        </div>
      </div>
    </div>
  `;
}

function renderCredits(filter = "ALL") {
  currentFilter = filter;
  grid.innerHTML = "";

  const filtered = filter === "ALL"
    ? credits
    : credits.filter(c => (c.types || []).includes(filter));

  if (!filtered.length) {
    grid.innerHTML = '<div class="status">NO CREDITS FOUND</div>';
    if (selectedCredit && !credits.some(c => isSameCredit(c, selectedCredit))) {
      selectedCredit = null;
      resetInfoPanel();
    }
    return;
  }

  filtered.forEach(credit => {
    const card = document.createElement("div");
    card.className = "album";
    if (selectedCredit && isSameCredit(credit, selectedCredit)) {
      card.classList.add("loaded");
    }

    const art = document.createElement("div");
    art.className = `album-art ${(credit.types || []).length >= 2 ? "shiny" : ""}`;
    art.style.background = getCardBackground(credit);

    const img = document.createElement("img");
    img.src = credit.image;
    img.alt = `${credit.name} cover`;
    img.loading = "lazy";

    const label = document.createElement("div");
    label.className = "album-label";
    label.textContent = credit.artist;

    art.appendChild(img);
    card.appendChild(label);
    card.appendChild(art);

    card.addEventListener("click", () => {
      selectedCredit = credit;
      document.querySelectorAll(".album").forEach(a => a.classList.remove("loaded"));
      card.classList.add("loaded");
      showInfo(credit);
      playClickSound();
    });

    grid.appendChild(card);
  });

  if (selectedCredit) {
    const selectedStillVisible = filtered.some(c => isSameCredit(c, selectedCredit));
    if (selectedStillVisible) {
      showInfo(selectedCredit);
    }
  }
}

async function loadCredits() {
  try {
    const response = await fetch("assets/data/credits.json");
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    credits = await response.json();
    renderCredits(currentFilter);
  } catch (error) {
    console.error("Failed to load credits:", error);
    grid.innerHTML = '<div class="status">FAILED TO LOAD CREDITS</div>';
    resetInfoPanel("DATA ERROR");
  }
}

buttons.forEach(btn => {
  btn.addEventListener("click", () => {
    buttons.forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    renderCredits(btn.dataset.type);
    playKnockSound();
  });
});

if (homeBtn) {
  homeBtn.addEventListener("click", (event) => {
    event.preventDefault();
    playKnockSound();

    setTimeout(() => {
      window.location.href = homeBtn.href;
    }, 120);
  });
}

resetInfoPanel();
loadCredits();
</script>
</body>
</html>
