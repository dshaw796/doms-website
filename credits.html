<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Credits Catalogue</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: 'Press Start 2P', cursive;
}

body {
  background-image: url("assets/images/home3.png");
  background-size: cover;
  background-position: top center;
  background-repeat: no-repeat;
  min-height: 100vh;
  color: #083c3c;
}

/* ===== WRAPPER ===== */
.wrapper {
  max-width: 800px;
  margin: 40px auto;
  padding: 10px;
}

/* ===== PANEL ===== */
.panel {
  backdrop-filter: blur(2px);
  background: rgba(255,255,255,0.15);
  border: 3px solid #8c3b2a;
  padding: 20px;
  box-shadow: 4px 4px #194242;
}

/* ===== TITLE ===== */
.title {
  text-align: center;
  font-size: 12px;
  margin-bottom: 20px;
  color: #8c3b2a;
}

/* ===== FILTERS ===== */
.categories {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
  margin-bottom: 20px;
}

.category-btn {
  font-size: 8px;
  padding: 8px;
  border: 2px solid #2b6f6f;
  background: #8c3b2a;
  color: #fff;
  cursor: pointer;
}

.category-btn.active {
  background: #2b6f6f;
}

/* ===== MAIN LAYOUT ===== */
.content {
  display: grid;
  grid-template-columns: 280px 1fr;
  gap: 20px;
  align-items: start;
}

/* ===== INFO PANEL (TRADING CARD) ===== */
.info-panel {
  backdrop-filter: blur(10px);
  background: rgba(255,255,255,0.25);
  border: 3px solid #2b6f6f;
  padding: 15px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.info-panel img {
  width: 100%;
  margin-bottom: 10px;
  border: 2px solid #333;
  image-rendering: pixelated;
}

.info-title {
  font-size: 9px;
  margin-bottom: 8px;
  text-align: center;
}

.info-type {
  font-size: 7px;
  color: #8c3b2a;
}

/* ===== GRID ===== */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
  gap: 12px;
  max-height: 500px;
  overflow-y: auto;
  padding-right: 5px;
}

/* ===== CARTRIDGE STYLE ===== */
.album {
  background:#cfd8cf;
  border:3px solid #333;
  padding:6px;
  cursor:pointer;
  position:relative;
  box-shadow:inset 0 -3px #888,2px 2px #000;
  transition:transform 0.1s;
}

.album:active {
  transform:scale(0.92);
}

.album.loaded {
  animation:pulse 1.5s infinite;
}

@keyframes pulse {
  0% { box-shadow: inset 0 -3px #888,2px 2px #000,0 0 0px #a8e0a8; }
  50% { box-shadow: inset 0 -3px #888,2px 2px #000,0 0 6px #a8e0a8; }
  100% { box-shadow: inset 0 -3px #888,2px 2px #000,0 0 0px #a8e0a8; }
}

.album::before {
  content:'';
  position:absolute;
  top:-6px;
  left:10px;
  right:10px;
  height:6px;
  background:#999;
  border:2px solid #333;
  border-bottom:none;
}

.album::after {
  content:'';
  position:absolute;
  bottom:4px;
  left:50%;
  transform:translateX(-50%);
  width:60%;
  height:3px;
  background:#888;
}

.album img {
  width:100%;
  image-rendering:pixelated;
  border:2px solid #333;
}

.album p {
  font-size:6px;
  margin-top:4px;
  text-align:center;
  color:#000;
}

/* ===== MOBILE LAYOUT ===== */
@media (max-width: 768px) {

  .wrapper {
    margin: 0;
    max-width: 100%;
  }

  .content {
    grid-template-columns: 1fr;
  }

  /* LANDSCAPE INFO PANEL */
  .info-panel {
    flex-direction: row;
    align-items: center;
    gap: 10px;
  }

  .info-panel img {
    width: 40%;
    margin: 0;
  }

  .info-text {
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

}
</style>
</head>

<body>

<div class="wrapper">
  <div class="panel">

    <div class="title">CREDITS DATABASE</div>

    <div class="categories">
      <button class="category-btn active" data-type="ALL">ALL</button>
      <button class="category-btn" data-type="ENGINEER">ENGINEER</button>
      <button class="category-btn" data-type="PERFORMING">PERFORMING</button>
      <button class="category-btn" data-type="MIX">MIX</button>
      <button class="category-btn" data-type="PRODUCTION">PRODUCTION</button>
      <button class="category-btn" data-type="ASST. ENG">ASST. ENG</button>
    </div>

    <div class="content">

      <!-- INFO PANEL -->
      <div class="info-panel" id="infoPanel">
        <div class="info-title">SELECT AN ALBUM</div>
      </div>

      <!-- GRID -->
      <div class="grid" id="grid"></div>

    </div>

  </div>
</div>

<script>
const credits = [
  { name: "Album One", type: "ENGINEER", image: "assets/images/album1.jpg" },
  { name: "Album Two", type: "MIX", image: "assets/images/album2.jpg" },
  { name: "Album Three", type: "PRODUCTION", image: "assets/images/album3.jpg" },
  { name: "Album Four", type: "PERFORMING", image: "assets/images/album4.jpg" },
  { name: "Album One", type: "ENGINEER", image: "assets/images/album1.jpg" },
  { name: "Album Two", type: "MIX", image: "assets/images/album2.jpg" },
  { name: "Album Three", type: "PRODUCTION", image: "assets/images/album3.jpg" },
  { name: "Album Four", type: "PERFORMING", image: "assets/images/album4.jpg" },
  { name: "Album One", type: "ENGINEER", image: "assets/images/album1.jpg" },
  { name: "Album Two", type: "MIX", image: "assets/images/album2.jpg" },
  { name: "Album Three", type: "PRODUCTION", image: "assets/images/album3.jpg" },
  { name: "Album Four", type: "PERFORMING", image: "assets/images/album4.jpg" },
  { name: "Album One", type: "ENGINEER", image: "assets/images/album1.jpg" },
  { name: "Album Two", type: "MIX", image: "assets/images/album2.jpg" },
  { name: "Album Three", type: "PRODUCTION", image: "assets/images/album3.jpg" },
  { name: "Album Four", type: "PERFORMING", image: "assets/images/album4.jpg" },
  { name: "Album One", type: "ENGINEER", image: "assets/images/album1.jpg" },
  { name: "Album Two", type: "MIX", image: "assets/images/album2.jpg" },
  { name: "Album Three", type: "PRODUCTION", image: "assets/images/album3.jpg" },
  { name: "Album Four", type: "PERFORMING", image: "assets/images/album4.jpg" },
  { name: "Album One", type: "ENGINEER", image: "assets/images/album1.jpg" },
  { name: "Album Two", type: "MIX", image: "assets/images/album2.jpg" },
  { name: "Album Three", type: "PRODUCTION", image: "assets/images/album3.jpg" },
  { name: "Album Four", type: "PERFORMING", image: "assets/images/album4.jpg" },
  { name: "Album One", type: "ENGINEER", image: "assets/images/album1.jpg" },
  { name: "Album Two", type: "MIX", image: "assets/images/album2.jpg" },
  { name: "Album Three", type: "PRODUCTION", image: "assets/images/album3.jpg" },
  { name: "Album Four", type: "PERFORMING", image: "assets/images/album4.jpg" },
  { name: "Album Five", type: "ASST. ENG", image: "assets/images/album5.jpg" }
];

const grid = document.getElementById("grid");
const infoPanel = document.getElementById("infoPanel");
const buttons = document.querySelectorAll(".category-btn");

function renderCredits(filter) {
  grid.innerHTML = "";

  const filtered = filter === "ALL"
    ? credits
    : credits.filter(c => c.type === filter);

  filtered.forEach(credit => {
    const card = document.createElement("div");
    card.className = "album";

    card.innerHTML = `
      <img src="${credit.image}">
      <p>${credit.name}</p>
    `;

    card.onclick = () => {
      document.querySelectorAll(".album").forEach(a => a.classList.remove("loaded"));
      card.classList.add("loaded");
      showInfo(credit);
    };

    grid.appendChild(card);
  });
}

function showInfo(credit) {
  infoPanel.innerHTML = `
    <img src="${credit.image}">
    <div class="info-text">
      <div class="info-title">${credit.name}</div>
      <div class="info-type">${credit.type}</div>
    </div>
  `;
}

buttons.forEach(btn => {
  btn.addEventListener("click", () => {
    buttons.forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    renderCredits(btn.dataset.type);
  });
});

renderCredits("ALL");
</script>

</body>
</html>
