<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dom Shaw - Producer, Engineer, Songwriter</title>
<meta name="description" content="Dom Shaw is a Grammy Award-winning engineer and multi-instrumentalist frontman of Waterlog.">
<meta name="robots" content="index,follow">
<link rel="canonical" href="/">
<meta property="og:type" content="website">
<meta property="og:title" content="Dom Shaw - Producer, Engineer, Songwriter">
<meta property="og:description" content="Music production, recording engineering, mixing work and Waterlog by Dom Shaw.">
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Person",
  "name": "Dom Shaw",
  "description": "Dom Shaw is a music producer, recording engineer, mixing engineer, songwriter and frontman of the band Waterlog.",
  "jobTitle": "Music Producer, Recording Engineer, Mixing Engineer, Musician",
  "memberOf": {
    "@type": "MusicGroup",
    "name": "Waterlog"
  }
}
</script>
<style>
  @font-face {
  font-family: 'Press Start 2P';
  src: url('assets/fonts/PressStart2P-Regular.ttf') format('truetype');
  font-weight: 400;
  font-style: normal;
  font-display: swap;
}
  * { margin: 0; padding: 0; box-sizing: border-box; }

  .sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow-x: hidden;
    background: #1a1a2e;
  }

  #scene {
    position: relative;
    width: 100%;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  #bg {
    position: fixed;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    image-rendering: pixelated;
    z-index: 0;
    transition: filter 0.2s ease;
  }

  #cloud-layer {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 60%;
    pointer-events: none;
    overflow: visible;
    z-index: 1;
  }

  .cloud,
  .bird {
    position: absolute;
    image-rendering: pixelated;
  }

  .cloud {
    opacity: 0.88;
  }

  .bird {
    opacity: 0.95;
  }

  #content {
    position: relative;
    z-index: 2;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  #title-spacer {
    height: calc(2 * 1.4em);
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(8px, 1.5vw, 14px);
  }

  #main-title {
    display: block;
    max-width: min(90vw, 700px);
    width: auto;
    image-rendering: pixelated;
    margin-bottom: clamp(15px, 2vh, 30px);
  }

  #menu {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: clamp(14px, 3vh, 26px);
    padding-right: 10px;
    padding-bottom: 60px;
    width: 100%;
    transition: filter 0.2s ease;
  }

  .menu-item {
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(10px, 3vw, 15px);
    color: #f0e6c8;
    text-decoration: none;
    text-shadow: 2px 2px 0px #000, 3px 3px 0px rgba(0,0,0,0.4);
    cursor: pointer;
    padding: 4px 0;
    transition: color 0.05s;
    user-select: none;
    white-space: nowrap;
  }

  button.menu-item {
    background: none;
    border: 0;
  }

  .menu-item:hover,
  .menu-item.active {
    color: #ffe066;
    text-shadow: 2px 2px 0px #000, 0 0 12px rgba(255,224,80,0.18);
  }

  .arrow-slot {
    position: absolute;
    right: calc(100% + 10px);
    font-size: 1em;
    color: #ffe066;
    text-shadow: 2px 2px 0px #000;
    visibility: hidden;
  }

  .arrow-slot.visible {
    visibility: visible;
    animation: blink 0.7s step-start infinite;
  }

  #settings-shell {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #settings-panel {
    position: absolute;
    top: 50%;
    left: calc(100% + 22px);
    transform: translateY(-50%);
    display: none;
    flex-direction: column;
    align-items: flex-start;
    gap: 12px;
    min-width: max-content;
    z-index: 5;
  }

  #settings-shell.open #settings-panel {
    display: flex;
  }

  .settings-option {
    position: relative;
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(7px, 1.9vw, 10px);
    color: #f0e6c8;
    text-shadow: 2px 2px 0px #000, 3px 3px 0px rgba(0,0,0,0.4);
    cursor: pointer;
    white-space: nowrap;
  }

  .settings-option input {
    position: absolute;
    opacity: 0;
    pointer-events: none;
  }

  .tick-box {
    position: relative;
    width: 18px;
    height: 18px;
    flex: 0 0 auto;
    border: 2px solid #f0e6c8;
    background: rgba(20, 16, 10, 0.9);
    box-shadow: 2px 2px 0 #000, inset -2px -2px 0 rgba(0, 0, 0, 0.45), inset 2px 2px 0 rgba(255, 255, 255, 0.08);
  }

  .tick-box::after {
    content: '';
    position: absolute;
    inset: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    line-height: 1;
    color: #201600;
    background: transparent;
  }

  .settings-option input:checked + .tick-box {
    border-color: #ffe066;
    background: #ffe066;
    box-shadow: 2px 2px 0 #000, inset -2px -2px 0 rgba(130, 95, 0, 0.45), inset 2px 2px 0 rgba(255, 255, 255, 0.22);
  }

  .settings-option input:checked + .tick-box::after {
    content: 'X';
  }

  .settings-option:hover .tick-box,
  .settings-option input:focus + .tick-box {
    border-color: #ffe066;
    box-shadow: 2px 2px 0 #000, 0 0 0 2px rgba(255, 224, 102, 0.18), inset -2px -2px 0 rgba(0, 0, 0, 0.45), inset 2px 2px 0 rgba(255, 255, 255, 0.08);
  }

  .settings-option-text {
    display: inline-block;
  }

  body.night-mode #bg {
    filter: invert(1) hue-rotate(180deg);
  }

  body.night-mode #menu {
    filter: invert(1);
  }

  @media (max-width: 500px) {
    #main-title {
      max-width: 100vw;
      margin-bottom: 5px;
    }

    .menu-item {
      font-size: clamp(14px, 3.2vw, 20px);
      padding: 8px 0;
    }

    #menu {
      gap: 16px;
    }

    #title-spacer {
      height: 1.5em;
    }

    #settings-panel {
      top: calc(100% + 12px);
      left: 50%;
      transform: translateX(-50%);
      gap: 10px;
      align-items: flex-start;
    }

    .settings-option {
      font-size: clamp(7px, 2.2vw, 9px);
    }
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }
</style>
</head>
<body>

<img id="bg" src="assets/images/home2.png" alt="">

<div id="cloud-layer"></div>

<div id="content">
  <section class="sr-only" aria-label="Site description">
    <h1>Dom Shaw</h1>
    <p>Dom Shaw is a Grammy Award-winning engineer, a music producer, songwriter and multi-instrumentalist frontman of Waterlog.</p>
  </section>
  <div id="title-spacer" aria-hidden="true"></div>
  <img id="main-title" src="assets/images/maintitle.png" alt="Dom Shaw">

  <nav id="menu" aria-label="Main menu">
    <a class="menu-item active" href="credits.html">
      <span class="arrow-slot">▶</span>CREDITS
    </a>
    <a class="menu-item" href="prod-demos.html">
      <span class="arrow-slot">▶</span>LOAD CARTRIDGE(S)
    </a>
    <a class="menu-item" href="about.html">
      <span class="arrow-slot">▶</span>ABOUT
    </a>
    <!--<a class="menu-item" href="start.html">
      <span class="arrow-slot visible">▶</span>START GAME
    </a>-->
    <div id="settings-shell">
      <button id="settings-toggle" class="menu-item" type="button" aria-haspopup="true" aria-expanded="false" aria-controls="settings-panel">
        <span class="arrow-slot">▶</span>SETTINGS
      </button>
      <div id="settings-panel" role="menu" aria-label="Settings options">
        <label class="settings-option" role="menuitemcheckbox" aria-checked="false">
          <input id="toggle-birds" type="checkbox">
          <span class="tick-box" aria-hidden="true"></span>
          <span class="settings-option-text">CHANGE CLOUDS TO "BIRDS"</span>
        </label>
        <label class="settings-option" role="menuitemcheckbox" aria-checked="false">
          <input id="toggle-night" type="checkbox">
          <span class="tick-box" aria-hidden="true"></span>
          <span class="settings-option-text">CHANGE TO NIGHT MODE</span>
        </label>
      </div>
    </div>
  </nav>
</div>

<script>
  const items = Array.from(document.querySelectorAll('.menu-item'));
  const settingsShell = document.getElementById('settings-shell');
  const settingsToggle = document.getElementById('settings-toggle');
  const settingsPanel = document.getElementById('settings-panel');
  const birdsToggle = document.getElementById('toggle-birds');
  const nightToggle = document.getElementById('toggle-night');
  const settingsOptions = document.querySelectorAll('.settings-option');
  const cloudLayer = document.getElementById('cloud-layer');
  const knockSound = new Audio('assets/audio/knock.mp3');

  let currentIndex = 0;
  let skyMode = 'clouds';
  const pendingTimeouts = new Set();
  const MENU_KNOCK_DELAY = 150;

  knockSound.preload = 'auto';

  function playKnockSound() {
    knockSound.pause();
    knockSound.currentTime = 0;

    const playPromise = knockSound.play();
    if (playPromise && typeof playPromise.catch === 'function') {
      playPromise.catch(() => {});
    }
  }

  function delayAction(callback, delay = MENU_KNOCK_DELAY) {
    window.setTimeout(callback, delay);
  }

  const cloudImages = ['assets/images/nube1.png', 'assets/images/nube2.png'];
  const birdImages = {
    ltr: {
      normal: 'assets/images/bird1.png',
      temp: 'assets/images/bird1temp.png'
    },
    rtl: {
      normal: 'assets/images/bird2.png',
      temp: 'assets/images/bird2temp.png'
    }
  };

  const BIRD_WIDTH = 72;
  const BIRD_HEIGHT_ESTIMATE = 42;
  const FLAP_MIN_DELAY = 1000;
  const FLAP_MAX_DELAY = 8000;
  const FLAP_FRAME_DURATION = 300;
  const DOUBLE_FLAP_CHANCE = 0.4;

  function setActive(index) {
    items.forEach((item, i) => {
      const arrow = item.querySelector('.arrow-slot');
      if (i === index) {
        item.classList.add('active');
        arrow.classList.add('visible');
      } else {
        item.classList.remove('active');
        arrow.classList.remove('visible');
      }
    });
    currentIndex = index;
  }

  function updateMenuCheckboxA11y() {
    settingsOptions.forEach((option) => {
      const input = option.querySelector('input');
      option.setAttribute('aria-checked', input.checked ? 'true' : 'false');
    });
  }

  function openSettingsPanel() {
    settingsShell.classList.add('open');
    settingsToggle.setAttribute('aria-expanded', 'true');
  }

  function closeSettingsPanel() {
    settingsShell.classList.remove('open');
    settingsToggle.setAttribute('aria-expanded', 'false');
  }

  function toggleSettingsPanel() {
    const shouldOpen = !settingsShell.classList.contains('open');
    if (shouldOpen) {
      openSettingsPanel();
      setActive(items.indexOf(settingsToggle));
    } else {
      closeSettingsPanel();
    }
  }

  function scheduleTimeout(fn, delay) {
    const timeoutId = window.setTimeout(() => {
      pendingTimeouts.delete(timeoutId);
      fn();
    }, delay);
    pendingTimeouts.add(timeoutId);
  }

  function clearScheduledTimeouts() {
    pendingTimeouts.forEach((timeoutId) => window.clearTimeout(timeoutId));
    pendingTimeouts.clear();
  }

  function clearSky() {
    cloudLayer.querySelectorAll('.cloud, .bird').forEach((el) => {
      el.getAnimations().forEach((animation) => animation.cancel());
      el.remove();
    });
  }

  function getSkyTop(spriteHeight) {
    const maxTop = window.innerHeight * 0.5 - spriteHeight;
    const biasedRandom = Math.random() ** 2;
    return Math.max(0, biasedRandom * maxTop);
  }

  function spawnCloud(startX, rtl) {
    if (skyMode !== 'clouds') {
      return;
    }

    const cloud = document.createElement('img');
    cloud.className = 'cloud';
    cloud.src = cloudImages[Math.floor(Math.random() * cloudImages.length)];

    const maxCloud = Math.min(380, window.innerWidth * 0.45);
    const minCloud = Math.min(200, window.innerWidth * 0.25);
    const scaleW = minCloud + Math.random() * (maxCloud - minCloud);
    cloud.style.width = scaleW + 'px';
    cloud.style.height = 'auto';

    const cloudH = scaleW * 0.5;
    cloud.style.top = getSkyTop(cloudH) + 'px';

    const baseDuration = 55000 + Math.random() * 25000;
    cloudLayer.appendChild(cloud);

    let fromX;
    let endX;
    let fullDist;

    if (rtl) {
      fromX = (startX !== undefined) ? startX : window.innerWidth + scaleW + 10;
      endX = -scaleW - 10;
      fullDist = window.innerWidth + scaleW * 2;
    } else {
      fromX = (startX !== undefined) ? startX : -scaleW - 10;
      endX = window.innerWidth + scaleW + 10;
      fullDist = window.innerWidth + scaleW * 2;
    }

    cloud.style.left = fromX + 'px';
    const travelDistance = Math.abs(endX - fromX);
    const duration = baseDuration * (travelDistance / fullDist);

    const animation = cloud.animate(
      [{ left: fromX + 'px' }, { left: endX + 'px' }],
      { duration, easing: 'linear', fill: 'forwards' }
    );

    animation.onfinish = () => {
      cloud.remove();
      if (skyMode === 'clouds') {
        spawnCloud(undefined, rtl);
      }
    };
  }

  function spawnBird(direction) {
    if (skyMode !== 'birds') {
      return;
    }

    const bird = document.createElement('img');
    bird.className = 'bird';
    bird.src = birdImages[direction].normal;
    bird.style.width = BIRD_WIDTH + 'px';
    bird.style.height = 'auto';
    bird.style.top = getSkyTop(BIRD_HEIGHT_ESTIMATE) + 'px';
    cloudLayer.appendChild(bird);

    const startFromLeft = direction === 'ltr';
    const fromX = startFromLeft ? -BIRD_WIDTH - 12 : window.innerWidth + BIRD_WIDTH + 12;
    const endX = startFromLeft ? window.innerWidth + BIRD_WIDTH + 12 : -BIRD_WIDTH - 12;
    const baseDuration = 17000 + Math.random() * 7000;
    const speedFactor = 0.7 + Math.random() * 0.3;
    const duration = baseDuration / speedFactor;

    bird.style.left = fromX + 'px';

    const stopFlapping = startBirdFlapping(bird, direction);

    const animation = bird.animate(
      [{ left: fromX + 'px' }, { left: endX + 'px' }],
      { duration, easing: 'linear', fill: 'forwards' }
    );

    animation.onfinish = () => {
      if (typeof stopFlapping === 'function') {
        stopFlapping();
      }
      bird.remove();
      if (skyMode === 'birds') {
        scheduleTimeout(() => spawnBird(direction), Math.random() * 3500);
      }
    };
  }

  function randomFlapDelay() {
    return FLAP_MIN_DELAY + Math.random() * (FLAP_MAX_DELAY - FLAP_MIN_DELAY);
  }

  function startBirdFlapping(bird, direction) {
    let flapTimeoutId = null;
    let isRemoved = false;

    const clearFlapTimer = () => {
      if (flapTimeoutId !== null) {
        window.clearTimeout(flapTimeoutId);
        flapTimeoutId = null;
      }
    };

    const restoreNormalSprite = () => {
      if (!isRemoved && bird.isConnected) {
        bird.src = birdImages[direction].normal;
      }
    };

    const scheduleNextFlap = () => {
      clearFlapTimer();

      if (isRemoved || skyMode !== 'birds' || !bird.isConnected) {
        return;
      }

      flapTimeoutId = window.setTimeout(runFlapCycle, randomFlapDelay());
    };

    const runFlapCycle = () => {
      if (isRemoved || skyMode !== 'birds' || !bird.isConnected) {
        return;
      }

      bird.src = birdImages[direction].temp;

      window.setTimeout(() => {
        restoreNormalSprite();

        if (Math.random() < DOUBLE_FLAP_CHANCE) {
          window.setTimeout(() => {
            if (isRemoved || skyMode !== 'birds' || !bird.isConnected) {
              return;
            }

            bird.src = birdImages[direction].temp;

            window.setTimeout(() => {
              restoreNormalSprite();
              scheduleNextFlap();
            }, FLAP_FRAME_DURATION);
          }, 80);
        } else {
          scheduleNextFlap();
        }
      }, FLAP_FRAME_DURATION);
    };

    scheduleNextFlap();

    return () => {
      isRemoved = true;
      clearFlapTimer();
    };
  }

  function startCloudMode() {
    skyMode = 'clouds';
    clearScheduledTimeouts();
    clearSky();

    const ltrCount = 3;
    const rtlCount = 1;
    const ltrGap = Math.floor(window.innerWidth / ltrCount);
    const rtlGap = Math.floor(window.innerWidth / rtlCount);

    for (let i = 0; i < ltrCount; i += 1) {
      const startX = i * ltrGap + Math.random() * (ltrGap * 0.4);
      scheduleTimeout(() => spawnCloud(startX, false), i * 600);
    }

    for (let i = 0; i < rtlCount; i += 1) {
      const startX = window.innerWidth - (i * rtlGap + Math.random() * (rtlGap * 0.4));
      scheduleTimeout(() => spawnCloud(startX, true), 3000 + i * 800);
    }
  }

  function startBirdMode() {
    skyMode = 'birds';
    clearScheduledTimeouts();
    clearSky();
    spawnBird('ltr');
    spawnBird('rtl');
  }

  function applySkyMode() {
    if (birdsToggle.checked) {
      startBirdMode();
    } else {
      startCloudMode();
    }
  }

  items.forEach((item, index) => {
    item.addEventListener('mouseenter', () => setActive(index));

    if (item.tagName === 'A') {
      item.addEventListener('click', (event) => {
        event.preventDefault();
        playKnockSound();

        const destination = item.href;
        delayAction(() => {
          window.location.href = destination;
        });
      });
    }
  });

  settingsOptions.forEach((option) => {
    option.addEventListener('click', () => {
      playKnockSound();
    });
  });

  settingsToggle.addEventListener('click', (event) => {
    event.preventDefault();
    playKnockSound();
    toggleSettingsPanel();
  });

  settingsToggle.addEventListener('keydown', (event) => {
    if (event.key === 'Enter' || event.key === ' ') {
      event.preventDefault();
      playKnockSound();
      toggleSettingsPanel();
    }
  });

  settingsPanel.addEventListener('mouseenter', () => {
    setActive(items.indexOf(settingsToggle));
  });

  document.addEventListener('click', (event) => {
    if (!settingsShell.contains(event.target)) {
      closeSettingsPanel();
    }
  });

  document.addEventListener('keydown', (event) => {
    if (event.key === 'Escape') {
      closeSettingsPanel();
    }
  });

  birdsToggle.addEventListener('change', () => {
    updateMenuCheckboxA11y();
    applySkyMode();
  });

  nightToggle.addEventListener('change', () => {
    document.body.classList.toggle('night-mode', nightToggle.checked);
    updateMenuCheckboxA11y();
  });

  updateMenuCheckboxA11y();
  setActive(0);
  startCloudMode();
</script>
